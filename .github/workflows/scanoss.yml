name: SCANOSS Int Test

on:
  pull_request:
  push:
    branches:
      - "*"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write
  actions: read

jobs:
  scanoss-code-scan:
    name: SCANOSS Code Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run SCANOSS Code Scan
        id: scanoss-code-scan-step
        uses: scanoss/code-scan-action@19a6bfbc0d56727c1db7c54bc15040083fb4bc82
        with:
          policies: copyleft, undeclared, depTrack
          api.key: ${{ secrets.SC_API_KEY }}

