name: SCANOSS Int Test

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write
  actions: read

jobs:
  scanoss-code-scan:
    name: SCANOSS Code Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run SCANOSS Code Scan
        id: scanoss-code-scan-step
        uses: scanoss/code-scan-action@feat/dependency-track-policy-check
        with:
          policies: cpl, und, dt
          api.key: ${{ secrets.SC_API_KEY }}
          deptrack.upload: true
          policies.halt_on_failure: true
          deptrack.url: 'https://dependency-track.scanos.xyz'
          deptrack.projectname: 'alex-test'
          deptrack.projectversion: '1.0.0'
          deptrack.apikey: ${{ secrets.DT_API_KEY }}

