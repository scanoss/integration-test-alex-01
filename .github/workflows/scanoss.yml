name: SCANOSS Int Test

on:
  pull_request:
  push:
    branches:
      - "*"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write
  actions: read

jobs:
  scanoss-code-scan:
    name: SCANOSS Code Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run SCANOSS Code Scan
        id: scanoss-code-scan-step
        uses: scanoss/code-scan-action@bug/SP-3210_policy-does-not-exist-error
        with:
          policies:
          api.key: ${{ secrets.SC_API_KEY }}
          deptrack.upload: true
          deptrack.url: 'https://dependency-track.scanoss.xyz/'
          deptrack.projectname: 'alex-test'
          deptrack.projectversion: '1.0.0'
          deptrack.apikey: ${{ secrets.DT_API_KEY }}
