name: SCANOSS Int Test

on:
  pull_request:
  push:
    branches:
      - "*"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  checks: write
  actions: read

jobs:
  scanoss-code-scan:
    name: SCANOSS Code Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run SCANOSS Code Scan
        id: scanoss-code-scan-step
        uses: scanoss/code-scan-action@feat/dependency-track-policy-check
        with:
          policies: copyleft, undeclared
          api.key: ${{ secrets.SC_API_KEY }}
          dependencytrack.enabled: true
          dependencytrack.url: 'https://dependency-track.scanoss.xyz'
          dependencytrack.projectname: 'alex-test'
          dependencytrack.projectversion: '1.0.0'
          dependencytrack.apikey: ${{ secrets.DT_API_KEY }}

