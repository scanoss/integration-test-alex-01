name: SCANOSS Int Test

on:
  workflow_call:
    inputs:
      FILTERED_PATH:
        required: true
        type: string
    secrets:
      SC_API_KEY:
        required: false
      DT_API_KEY:
        required: false

permissions:
  contents: write
  pull-requests: write
  checks: write
  actions: read

jobs:
  scanoss-code-scan:
    name: SCANOSS Code Scan - ${{ inputs.FILTERED_PATH }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run SCANOSS Code Scan
        id: scanoss-code-scan-step
        uses: scanoss/code-scan-action@feat/SP-3754_alternate-scan-root
        with:
          policies: cpl, und, dt
          api.key: ${{ secrets.SC_API_KEY }}
          deptrack.upload: true
          deptrack.url: 'https://dependency-track.scanoss.xyz/'
          deptrack.projectname: 'gha-subfolder'
          deptrack.projectversion: '1.0.0'
          deptrack.apikey: ${{ secrets.DT_API_KEY }}
          scanPath: ${{ inputs.FILTERED_PATH }}
          settingsFilepath: 'scanoss.json'

